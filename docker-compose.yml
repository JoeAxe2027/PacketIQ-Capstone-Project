services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app/backend
      - ./logs:/data/logs
      - ./pcaps:/data/pcaps
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/packetiq

  db:
    image: pgvector/pgvector:pg16
    container_name: packetiq_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: packetiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

volumes:
  postgres_data: